<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#0E5249" />
  <meta name="description" content="Gestió de neteja d'habitacions d'hotel: pisos, cambreres, assignacions, checklists, fotos i incidències." />
  <title>Cambra · Gestió de neteja</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cambra" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Pantalla de càrrega -->
  <div id="splash" class="splash">
    <div class="splash-mark">
      <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
        <rect x="13" y="29" width="38" height="14" rx="3" fill="currentColor"/>
        <rect x="9" y="22" width="6" height="24" rx="2" fill="currentColor"/>
        <rect x="17" y="26" width="13" height="7" rx="2" fill="#0a3d36"/>
        <rect x="13" y="38" width="38" height="5" rx="2" fill="#C2603D"/>
        <path d="M45 14l2.4 5.6L53 22l-5.6 2.4L45 30l-2.4-5.6L37 22l5.6-2.4z" fill="currentColor"/>
      </svg>
    </div>
    <p class="splash-name">Cambra</p>
  </div>

  <!-- Capçalera -->
  <header class="app-header" id="appHeader" hidden>
    <div class="app-header__left">
      <span class="app-header__logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="26" height="26">
          <rect x="13" y="29" width="38" height="14" rx="3" fill="currentColor"/>
          <rect x="9" y="22" width="6" height="24" rx="2" fill="currentColor"/>
          <rect x="13" y="38" width="38" height="5" rx="2" fill="#C2603D"/>
          <path d="M45 14l2.4 5.6L53 22l-5.6 2.4L45 30l-2.4-5.6L37 22l5.6-2.4z" fill="currentColor"/>
        </svg>
      </span>
      <div>
        <h1 class="app-header__title" id="hotelName">Cambra</h1>
        <p class="app-header__sub" id="headerSub">Gestió de neteja</p>
      </div>
    </div>
    <div class="app-header__actions">
      <button class="user-btn" id="userBtn" hidden aria-label="Usuari">
        <span class="user-btn__av" id="userAv">?</span>
        <span class="user-btn__name" id="userName"></span>
      </button>
      <button class="icon-btn icon-btn--labeled" id="fullscreenBtn" aria-label="Pantalla completa">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
        <span id="fullscreenLabel" class="icon-btn__label">Pantalla completa</span>
      </button>
      <button class="icon-btn" id="installBtn" hidden aria-label="Instal·la l'app">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
      </button>
    </div>
  </header>

  <!-- Contingut de la vista -->
  <main id="view" class="view" aria-live="polite"></main>

  <!-- Navegació inferior -->
  <nav class="tabbar" id="tabbar" hidden>
    <button class="tab" data-route="board" aria-label="Tauler">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      <span>Tauler</span>
    </button>
    <button class="tab" data-route="incidents" aria-label="Incidències">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
      <span>Incidències</span>
      <span class="tab-badge" id="incBadge" hidden></span>
    </button>
    <button class="tab" data-route="report" aria-label="Informe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M14 3v5h5M8 13h8M8 17h5"/></svg>
      <span>Informe</span>
    </button>
    <button class="tab" data-route="setup" aria-label="Configuració">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 6.7 19.4a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 13.9 2 2 0 0 1 3 10h.1a1.6 1.6 0 0 0 1.1-2.7 2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 3.1V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1 2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 20.9 10H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
      <span>Configura</span>
    </button>
  </nav>

  <!-- Contenidor de modals -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="assertive"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
