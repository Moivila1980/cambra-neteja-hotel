# Cambra — lloc estàtic (sense build). Netlify publica l'arrel del repo.
[build]
  publish = "."
  command = ""

# El service worker s'ha de revalidar sempre per agafar versions noves
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
